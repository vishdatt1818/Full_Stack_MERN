<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .parent{
            height: 80vh;
            width: 80vw;
            border: 2px solid orange;
            margin: 50px;

        }
        .imgg{
            height: 200px;
            width: 200px;
            transition: transform 0.6s ease-in-out,
             border-radius 0.6s ease-in-out
        }
        .divs{
            display: flex;
            
            justify-content: space-evenly;
            margin: 60px;
            /* align-items: ; */
        }
        .divf{
            display: flex;
            justify-content: center;
            margin: 50px;
        }
        .right{
            display: flex;
            flex-direction: column;

        }
        h1{
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="parent">
        <div class="divf">
            <img id="first" class="imgg" src="https://images.unsplash.com/photo-1516617442634-75371039cb3a?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YmFja2dyb3VuZCUyMGltYWdlfGVufDB8fDB8fHww" alt="">
        </div>
        <div class="divs">
            <img onmouseover="changeImg()" onmouseout="resetImg()" id="second" class="imgg" src="https://images.unsplash.com/photo-1601314167099-232775b3d6fd?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fGJhY2tncm91bmQlMjBpbWFnZXxlbnwwfHwwfHx8MA%3D%3D" alt="">
            <img onmouseover="changeImg1()" onmouseout="resetImg1()" id="third" class="imgg" src="https://plus.unsplash.com/premium_photo-1710119487743-48959c984d45?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fGJhY2tncm91bmQlMjBpbWFnZXxlbnwwfHwwfHx8MA%3D%3D" alt="">
            <img onmouseover="changeImg2()" onmouseout="resetImg2()" id="fourth" class="imgg" src="https://images.unsplash.com/photo-1723384747376-90f201a3bd55?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fGJhY2tncm91bmQlMjBpbWFnZXxlbnwwfHwwfHx8MA%3D%3D" alt="">
            <img onmouseover="changeImg3()" onmouseout="resetImg3()" id="fiifth" class="imgg" src="https://images.unsplash.com/photo-1631631480669-535cc43f2327?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8YmFja2dyb3VuZCUyMGltYWdlfGVufDB8fDB8fHww" alt="">
        </div>
    </div>
    <div class="right">
        <h1 id="countDisply">0</h1>
    <button id="btn">Click for count</button> <br>
    <button id="btn1">Click for Dark mode</button>
    </div>
    <script src="dom.js"></script>
</body>
</html>
