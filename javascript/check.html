<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .firstBox {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border: 2px solid orange;
        background-color: bisque;
        height: 450px;
        width: 320px;
      }
      .parent {
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        height: 100vh;
      }
      .panel {
        height: 450px;
        width: 320px;
        background-color: bisque;
        border: 2px solid orange;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      /* Added a clean class for your Receipt styling */
      .receiptBox {
        height: 450px;
        width: 320px;
        background-color: white;
        border: 2px solid gray;
        padding: 15px;
        box-sizing: border-box;
        font-family: monospace;
      }
      .keypad {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(2, 120px);
        gap: 5px;
        justify-content: center;
      }
      body {
        background-color: beige;
      }
      #units {
        width: 50px;
      }
      #pay {
        margin-top: 20px;
        width: 60px;
        height: 30px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th, td {
        border: 1px solid black;
        text-align: left;
        padding: 4px;
      }
    </style>
  </head>

  <body>
    <div class="parent">
      <div class="firstBox">
        <h1>Admin</h1>
        <h4>Add a new Product</h4>
        <div>
          <input id="product" type="text" />
          <button id="btn">Add Product</button>
        </div>
        <h4>Select a product then add the price per unit</h4>
        <select name="" id="pList"></select>
        <div>
          <input id="price" type="text" />
          <button id="btn1">Add Price</button>
        </div>
        <p id="mess"></p>
      </div>

      <div class="panel">
        <h2>Checkout</h2>
        <button id="newTransaction">New Transaction</button>
        <h3>Select a product then add the number of units</h3>
        <div class="row">
          <select id="checkoutProduct"></select>
          <label>Unit:</label>
          <input type="text" id="units" value="0" />
        </div>
        <button id="addCartBtn" style="margin-top: 10px;">Add To Cart</button>
        <div class="keypad">
          <button id="1" class="num">1</button>
          <button id="2" class="num">2</button>
          <button id="3" class="num">3</button>
          <button id="4" class="num">4</button>
          <button id="5" class="num">5</button>
          <button id="6" class="num">6</button>
          <button id="7" class="num">7</button>
          <button id="8" class="num">8</button>
          <button id="9" class="num">9</button>
        </div>
        <button id="pay">Pay</button>
      </div>

      <div class="receiptBox" id="receiptContainer">
        <h2 style="text-align: center; margin-top: 0;">Receipt</h2>
        <p>Click "Pay" to generate invoice...</p>
      </div>
    </div>

    <script>
      let list = [];

      const product = document.querySelector("#product");
      const btn = document.querySelector("#btn");
      const pList = document.querySelector("#pList");
      const mess = document.querySelector("#mess");

      btn.addEventListener("click", () => {
        let productObj = {
          name: product.value.trim(),
          price: null,
          unit: null,
        };
        if(productObj.name === "") return;
        list.push(productObj);

        pList.innerHTML += `<option value="${productObj.name}">${productObj.name}</option>`;
        mess.textContent = `${productObj.name} added`;
        product.value = "";
      });

      const btn1 = document.querySelector("#btn1");
      btn1.addEventListener("click", () => {
        const pprice = document.querySelector("#price");
        const selectedProduct = pList.value;

        const foundProduct = list.find((item) => item.name === selectedProduct);
        if(foundProduct) {
          foundProduct.price = parseFloat(pprice.value) || 0;
          mess.textContent = `${selectedProduct} price $${pprice.value} added`;
          pprice.value = "";
        }
      });

      const newTransaction = document.querySelector("#newTransaction");
      const checkoutProduct = document.querySelector("#checkoutProduct");

      newTransaction.addEventListener("click", () => {
        checkoutProduct.innerHTML = '<option value="">-- Select Product --</option>';
        list.forEach((item) => {
          if(item.price !== null) {
            checkoutProduct.innerHTML += `<option value="${item.name}">${item.name} $ ${item.price} /unit</option>`;
          }
          // Clear previous unit quantities for a fresh basket sequence
          item.unit = null;
        });
        document.querySelector("#receiptContainer").innerHTML = `
          <h2 style="text-align: center; margin-top: 0;">Receipt</h2>
          <p>Click "Pay" to generate invoice...</p>
        `;
      });

      const units = document.querySelector("#units");
      const numButtons = document.querySelectorAll(".num");

      numButtons.forEach((button) => {
        button.addEventListener("click", () => {
          if (units.value === "0") {
            units.value = button.textContent;
          } else {
            units.value += button.textContent;
          }
        });
      });

      const addCartBtn = document.querySelector("#addCartBtn");
      addCartBtn.addEventListener("click", () => {
        const selectedProduct = checkoutProduct.value;
        const checkOutProductSelected = list.find((item) => item.name === selectedProduct);

        if(checkOutProductSelected) {
          // Store amount as integer value
          checkOutProductSelected.unit = parseInt(units.value) || 0;
          alert(`${units.value} units of ${selectedProduct} added to cart!`);
          units.value = "0";
        } else {
          alert("Please select a product first!");
        }
      });

      // --- NEW RECEIPT GENERATION LOGIC ---
      const pay = document.querySelector("#pay");
      const receiptContainer = document.querySelector("#receiptContainer");

      pay.addEventListener("click", () => {
        // 1. Filter out only items that were actually added to the cart
        const cartItems = list.filter(item => item.unit > 0 && item.price !== null);

        if (cartItems.length === 0) {
          alert("Your cart is empty! Add units to your products first.");
          return;
        }

        // 2. Setup structural date and time
        const now = new Date();
        const dateStr = `${now.getDate().toString().padStart(2, '0')}/${(now.getMonth()+1).toString().padStart(2, '0')}/${now.getFullYear()}`;
        
        let hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        const timeStr = `${hours}:${minutes} ${ampm}`;

        // 3. Compute running mathematics calculations
        let totalOriginalPrice = 0;
        let tableRowsHtml = "";

        cartItems.forEach(item => {
          const itemTotalCost = item.price * item.unit;
          totalOriginalPrice += itemTotalCost;

          tableRowsHtml += `
            <tr>
              <td>${item.name}</td>
              <td>${item.price.toFixed(2)}</td>
              <td>${item.unit}</td>
              <td>${itemTotalCost.toFixed(2)}</td>
            </tr>
          `;
        });

        // Compute localized values matching your screenshot parameters (approx 5% calculation tax sample)
        const computedTax = totalOriginalPrice * 0.05; 
        const aggregateDue = totalOriginalPrice + computedTax;

        // 4. Construct structural component layouts
        receiptContainer.innerHTML = `
          <div style="font-weight: bold; margin-bottom: 5px;">Date: ${dateStr}</div>
          <div style="font-weight: bold; margin-bottom: 15px;">Time: ${timeStr}</div>
          
          <table>
            <thead>
              <tr>
                <th>Product</th>
                <th>$/unit</th>
                <th>Unit(s)</th>
                <th>Price</th>
              </tr>
            </thead>
            <tbody>
              ${tableRowsHtml}
            </tbody>
          </table>

          <div style="margin-top: 15px; font-weight: bold;">Total Price: ${totalOriginalPrice.toFixed(2)}</div>
          <div style="margin-top: 5px; font-weight: bold;">Taxes: ${computedTax.toFixed(2)}</div>
          <div style="margin-top: 5px; font-weight: bold; font-size: 1.1em;">Amount Due: ${aggregateDue.toFixed(2)}</div>
        `;
      });
    </script>
  </body>
</html>
