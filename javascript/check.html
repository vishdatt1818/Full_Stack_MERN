<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            height: 80vh;
            border: 2px solid orange;
        }
        .imgg{
            height: 200px;
            width: 200px;
            /* Added transition here so changes to transform or border-radius animate smoothly */
            transition: transform 0.6s ease-in-out, border-radius 0.6s ease-in-out;
        }
        .divs{
            display: flex;
            justify-content: space-evenly;
            margin: 60px;
        }
        .divf{
            display: flex;
            justify-content: center;
            margin: 50px;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="divf">
            <img id="first" class="imgg" src="https://images.unsplash.com/photo-1516617442634-75371039cb3a?w=600&auto=format&fit=crop&q=60" alt="">
        </div>
        <div class="divs">
            <img onmouseover="changeImg()" onmouseout="resetImg()" id="second" class="imgg" src="https://images.unsplash.com/photo-1601314167099-232775b3d6fd?w=600&auto=format&fit=crop&q=60" alt="">
            <img onmouseover="changeImg1()" onmouseout="resetImg1()" id="third" class="imgg" src="https://plus.unsplash.com/premium_photo-1710119487743-48959c984d45?w=600&auto=format&fit=crop&q=60" alt="">
            <img onmouseover="changeImg2()" onmouseout="resetImg2()" id="fourth" class="imgg" src="https://images.unsplash.com/photo-1723384747376-90f201a3bd55?w=600&auto=format&fit=crop&q=60" alt="">
            <img onmouseover="changeImg3()" onmouseout="resetImg3()" id="fiifth" class="imgg" src="https://images.unsplash.com/photo-1631631480669-535cc43f2327?w=600&auto=format&fit=crop&q=60" alt="">
        </div>
    </div>
    
    <script>
        // Select the main display image once
        let mainImg = document.getElementById("first");

        function changeImg(){
            mainImg.src = "https://images.unsplash.com/photo-1601314167099-232775b3d6fd?w=600&auto=format&fit=crop&q=60";
            mainImg.style.transform = "rotate(360deg)";
            mainImg.style.borderRadius = "50%";
        }

        function resetImg(){
            mainImg.src = "https://images.unsplash.com/photo-1516617442634-75371039cb3a?w=600&auto=format&fit=crop&q=60";
            // Spin it back and make it a square again
            mainImg.style.transform = "rotate(0deg)";
            mainImg.style.borderRadius = "0%";
        }

        function changeImg1(){
            mainImg.src = "https://plus.unsplash.com/premium_photo-1710119487743-48959c984d45?w=600&auto=format&fit=crop&q=60";
        }

        function resetImg1(){
            mainImg.src = "https://images.unsplash.com/photo-1516617442634-75371039cb3a?w=600&auto=format&fit=crop&q=60";
        }

        function changeImg2(){
            mainImg.src = "https://images.unsplash.com/photo-1723384747376-90f201a3bd55?w=600&auto=format&fit=crop&q=60";
        }

        function resetImg2(){
            mainImg.src = "https://images.unsplash.com/photo-1516617442634-75371039cb3a?w=600&auto=format&fit=crop&q=60";
        }

        function changeImg3(){
            mainImg.src = "https://images.unsplash.com/photo-1631631480669-535cc43f2327?w=600&auto=format&fit=crop&q=60";
        }

        function resetImg3(){
            mainImg.src = "https://images.unsplash.com/photo-1516617442634-75371039cb3a?w=600&auto=format&fit=crop&q=60";
        }
    </script>
</body>
</html>
