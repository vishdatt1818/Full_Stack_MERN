<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="">
      <label for="name">Name</label><br />
      <input type="text" id="name" placeholder="Enter your Name" /><br />

      <label for="email">Email</label><br />
      <input
        type="email"
        id="email"
        placeholder="Enter your email"
        required
      /><br />

      <label for="cno">Contact No.</label><br />
      <input
        type="number"
        id="cno"
        placeholder="Enter your contact No."
      /><br />

      <input id="male" type="radio" name="mf" />
      <label for="male">Male</label>
      <input id="female" type="radio" name="mf" />
      <label for="female">Female</label><br />

      <input type="checkbox" id="Married" name="m" />
      <label for="Married"></label>
      <input type="checkbox" id="Un-Married" name="m" />
      <label for="Un-Married"></label><br />

      <label for="">Upload File</label>
      <input type="file" /><br />
      <button>submit</button>
    </form>
  </body>
</html>
